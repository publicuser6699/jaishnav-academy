<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Space Academy & Hero HQ</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Bangers&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  /* Shared */
  --font-body: 'Nunito', sans-serif;
  --font-space: 'Orbitron', monospace;
  --font-hero: 'Bangers', cursive;
  /* Jaishnav — Space */
  --j-dark: #050a1a;
  --j-mid: #0d1b3e;
  --j-blue: #1a3a6e;
  --j-gold: #f5c842;
  --j-cyan: #00e5ff;
  --j-purple: #a855f7;
  --j-green: #22c55e;
  --j-coral: #ff6b6b;
  --j-orange: #ff9f43;
  /* Sakshi — Spider-Man */
  --s-dark: #0a0000;
  --s-mid: #1a0000;
  --s-red: #cc0000;
  --s-red2: #ff1a1a;
  --s-blue: #003366;
  --s-blue2: #0055aa;
  --s-gold: #ffd700;
  --s-white: #f0f0f0;
  --s-web: rgba(255,255,255,0.12);
  /* Shared UI */
  --text-bright: #ffffff;
  --text-dim: #8ba3cc;
  --card-bg: rgba(255,255,255,0.04);
  --card-border: rgba(255,255,255,0.1);
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;min-height:100vh;background:#050a1a;color:#fff;font-family:var(--font-body);overflow-x:hidden;}

/* ── BACKGROUNDS ── */
#bg-j{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;display:none;}
#bg-s{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;display:none;background:var(--s-dark);}
.star{position:absolute;border-radius:50%;background:#fff;animation:twinkle var(--d,3s) ease-in-out infinite;opacity:0;}
@keyframes twinkle{0%,100%{opacity:0}50%{opacity:var(--o,.8)}}
.nebula{position:absolute;border-radius:50%;filter:blur(60px);opacity:.07;pointer-events:none;}
/* Spider web lines */
.web-line{position:absolute;background:rgba(255,255,255,0.06);transform-origin:top left;}

/* ── SCREENS ── */
.screen{display:none;min-height:100vh;position:relative;z-index:1;}
.screen.active{display:flex;flex-direction:column;}

/* ══════════════════════════════════════
   FAMILY LOGIN SCREEN
══════════════════════════════════════ */
#family-screen{align-items:center;justify-content:center;padding:2rem;background:linear-gradient(180deg,#050a1a 0%,#0d1b3e 100%);}
.family-title{font-family:var(--font-space);font-size:1rem;color:#8ba3cc;letter-spacing:4px;text-align:center;margin-bottom:0.5rem;}
.family-sub{font-size:0.85rem;color:#4a6080;text-align:center;margin-bottom:2.5rem;letter-spacing:1px;}
.profile-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;width:100%;max-width:420px;}
.profile-card{border-radius:20px;padding:1.5rem 1rem;text-align:center;cursor:pointer;transition:transform .2s,box-shadow .2s;position:relative;overflow:hidden;}
.profile-card:hover{transform:translateY(-4px);}
.profile-card:active{transform:scale(.97);}
/* Jaishnav card */
.pcard-j{background:linear-gradient(135deg,#0d1b3e,#1a3a6e);border:1px solid rgba(0,229,255,.25);box-shadow:0 0 30px rgba(0,229,255,.08);}
/* Sakshi card */
.pcard-s{background:linear-gradient(135deg,#1a0000,#3a0000);border:1px solid rgba(204,0,0,.35);box-shadow:0 0 30px rgba(204,0,0,.12);}
.pcard-icon{font-size:52px;display:block;margin-bottom:.75rem;animation:float 3s ease-in-out infinite;}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.pcard-name-j{font-family:var(--font-space);font-size:1rem;font-weight:900;color:var(--j-cyan);letter-spacing:1px;}
.pcard-name-s{font-family:var(--font-hero);font-size:1.4rem;letter-spacing:2px;color:var(--s-red2);}
.pcard-grade{font-size:.72rem;color:#8ba3cc;margin-top:3px;letter-spacing:1px;}

/* ── LOGIN CARD (shared) ── */
#login-screen{align-items:center;justify-content:center;padding:2rem;}
.login-card{border-radius:24px;padding:2.5rem 2rem;width:100%;max-width:380px;text-align:center;backdrop-filter:blur(20px);}
.login-card-j{background:rgba(13,27,62,.9);border:1px solid rgba(0,229,255,.2);}
.login-card-s{background:rgba(26,0,0,.92);border:1px solid rgba(204,0,0,.35);}
.login-avatar{font-size:64px;display:block;margin-bottom:1rem;animation:float 3s ease-in-out infinite;}
.login-title-j{font-family:var(--font-space);font-size:1.2rem;font-weight:900;color:var(--j-cyan);letter-spacing:2px;margin-bottom:.25rem;}
.login-title-s{font-family:var(--font-hero);font-size:2rem;letter-spacing:3px;color:var(--s-red2);margin-bottom:.25rem;}
.login-sub{color:#8ba3cc;font-size:.85rem;margin-bottom:1.5rem;}
.login-input{width:100%;padding:.85rem 1.2rem;border-radius:12px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.15);color:#fff;font-size:1rem;font-family:var(--font-body);letter-spacing:3px;text-align:center;outline:none;transition:border .2s;margin-bottom:1rem;}
.login-input:focus{border-color:var(--j-cyan);}
.login-input-s:focus{border-color:var(--s-red2);}
.login-btn-j{width:100%;padding:.9rem;border-radius:12px;border:none;cursor:pointer;background:linear-gradient(135deg,#00e5ff,#a855f7);color:#fff;font-family:var(--font-space);font-size:.85rem;font-weight:700;letter-spacing:2px;transition:transform .15s;}
.login-btn-s{width:100%;padding:.9rem;border-radius:12px;border:none;cursor:pointer;background:linear-gradient(135deg,#cc0000,#0055aa);color:#fff;font-family:var(--font-hero);font-size:1.2rem;letter-spacing:3px;transition:transform .15s;}
.login-btn-j:hover,.login-btn-s:hover{transform:scale(1.02);}
.back-to-family{margin-top:1rem;background:none;border:none;color:#8ba3cc;font-size:.8rem;cursor:pointer;text-decoration:underline;font-family:var(--font-body);}
.login-error{color:#ff6b6b;font-size:.82rem;margin-top:.4rem;min-height:1.1rem;}

/* ══════════════════════════════════════
   SHARED HOME / NAV
══════════════════════════════════════ */
#home-screen{padding:0;}
.home-header{padding:1.25rem 1.5rem .75rem;position:sticky;top:0;z-index:10;backdrop-filter:blur(12px);}
.home-header-j{background:linear-gradient(180deg,rgba(5,10,26,.95) 0%,transparent 100%);}
.home-header-s{background:linear-gradient(180deg,rgba(10,0,0,.95) 0%,transparent 100%);}
.home-top{display:flex;align-items:center;justify-content:space-between;}
.home-greeting .hey{font-size:.7rem;color:#8ba3cc;letter-spacing:2px;}
.home-greeting-j .name{font-family:var(--font-space);font-size:1.2rem;font-weight:900;color:var(--j-gold);}
.home-greeting-s .name{font-family:var(--font-hero);font-size:1.6rem;letter-spacing:2px;color:var(--s-red2);}
.xp-badge-j{background:rgba(245,200,66,.12);border:1px solid rgba(245,200,66,.3);border-radius:20px;padding:.35rem .8rem;font-family:var(--font-space);font-size:.72rem;color:var(--j-gold);display:flex;align-items:center;gap:5px;}
.xp-badge-s{background:rgba(255,215,0,.12);border:1px solid rgba(255,215,0,.3);border-radius:20px;padding:.35rem .8rem;font-family:var(--font-hero);font-size:1rem;color:var(--s-gold);display:flex;align-items:center;gap:5px;letter-spacing:1px;}
.streak-bar{margin-top:.6rem;display:flex;align-items:center;gap:8px;}
.streak-label{font-size:.72rem;color:#8ba3cc;}
.streak-dots{display:flex;gap:4px;}
.streak-dot{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,.1);transition:background .3s;}
.streak-dot-j.lit{background:var(--j-gold);box-shadow:0 0 6px var(--j-gold);}
.streak-dot-s.lit{background:var(--s-red2);box-shadow:0 0 6px var(--s-red2);}
.home-body{padding:.75rem 1.5rem 6rem;}
.section-title{font-size:.68rem;letter-spacing:3px;color:#8ba3cc;margin:1.25rem 0 .65rem;text-transform:uppercase;}
.section-title-j{font-family:var(--font-space);}
.section-title-s{font-family:var(--font-hero);font-size:.85rem;letter-spacing:2px;}

/* Mission card */
.mission-card{border-radius:18px;padding:1.1rem;margin-bottom:.5rem;cursor:pointer;transition:transform .2s;position:relative;overflow:hidden;}
.mission-card-j{background:linear-gradient(135deg,rgba(0,229,255,.1),rgba(168,85,247,.1));border:1px solid rgba(0,229,255,.2);}
.mission-card-s{background:linear-gradient(135deg,rgba(204,0,0,.2),rgba(0,51,102,.2));border:1px solid rgba(204,0,0,.3);}
.mission-card:hover{transform:scale(1.01);}
.mission-tag-j{font-size:.68rem;letter-spacing:2px;color:var(--j-cyan);font-family:var(--font-space);margin-bottom:.3rem;}
.mission-tag-s{font-size:.9rem;letter-spacing:2px;color:var(--s-red2);font-family:var(--font-hero);margin-bottom:.3rem;}
.mission-title{font-size:1rem;font-weight:800;margin-bottom:.2rem;}
.mission-sub{font-size:.78rem;color:#8ba3cc;}
.mission-xp-j{position:absolute;top:.9rem;right:.9rem;background:rgba(245,200,66,.15);border:1px solid rgba(245,200,66,.3);border-radius:8px;padding:.18rem .55rem;font-size:.72rem;color:var(--j-gold);font-family:var(--font-space);}
.mission-xp-s{position:absolute;top:.9rem;right:.9rem;background:rgba(255,215,0,.15);border:1px solid rgba(255,215,0,.3);border-radius:8px;padding:.18rem .55rem;font-size:.9rem;color:var(--s-gold);font-family:var(--font-hero);letter-spacing:1px;}

/* Subject grid */
.subject-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.subject-card{border-radius:16px;padding:1.1rem .9rem;cursor:pointer;transition:transform .2s;position:relative;overflow:hidden;min-height:120px;display:flex;flex-direction:column;justify-content:space-between;}
.subject-card:hover{transform:translateY(-3px);}
.subject-card:active{transform:scale(.97);}
/* Jaishnav subjects */
.subj-j-maths{background:linear-gradient(135deg,#1a3a6e,#0d2550);border:1px solid rgba(0,229,255,.2);}
.subj-j-english{background:linear-gradient(135deg,#2d1b4e,#1a0d38);border:1px solid rgba(168,85,247,.2);}
.subj-j-science{background:linear-gradient(135deg,#0d3320,#071d12);border:1px solid rgba(34,197,94,.2);}
.subj-j-tamil{background:linear-gradient(135deg,#3a1a00,#1f0e00);border:1px solid rgba(255,159,67,.2);}
.subj-j-iq{background:linear-gradient(135deg,#3a001a,#200010);border:1px solid rgba(255,107,107,.2);}
/* Sakshi subjects */
.subj-s-maths{background:linear-gradient(135deg,#2a0000,#440000);border:1px solid rgba(204,0,0,.3);}
.subj-s-english{background:linear-gradient(135deg,#001a33,#003366);border:1px solid rgba(0,85,170,.35);}
.subj-s-tamil{background:linear-gradient(135deg,#1a1a00,#2a2a00);border:1px solid rgba(255,215,0,.25);}
.subj-s-drawing{background:linear-gradient(135deg,#001a1a,#002a2a);border:1px solid rgba(0,200,200,.25);}
.subj-s-gk{background:linear-gradient(135deg,#1a0033,#2d0055);border:1px solid rgba(150,80,255,.25);}
.subj-icon{font-size:28px;display:block;margin-bottom:.4rem;}
.subj-name{font-weight:800;font-size:.9rem;}
.subj-count{font-size:.68rem;color:#8ba3cc;margin-top:1px;}
.subj-progress{height:3px;border-radius:2px;background:rgba(255,255,255,.07);margin-top:.6rem;overflow:hidden;}
.subj-progress-fill{height:100%;border-radius:2px;transition:width .6s ease;}
/* subject name colours */
.subj-j-maths .subj-name{color:var(--j-cyan);}
.subj-j-english .subj-name{color:var(--j-purple);}
.subj-j-science .subj-name{color:var(--j-green);}
.subj-j-tamil .subj-name{color:var(--j-orange);}
.subj-j-iq .subj-name{color:var(--j-coral);}
.subj-s-maths .subj-name{color:var(--s-red2);}
.subj-s-english .subj-name{color:#4da6ff;}
.subj-s-tamil .subj-name{color:var(--s-gold);}
.subj-s-drawing .subj-name{color:#00e5e5;}
.subj-s-gk .subj-name{color:#b06aff;}
/* progress fill colours */
.subj-j-maths .subj-progress-fill{background:var(--j-cyan);}
.subj-j-english .subj-progress-fill{background:var(--j-purple);}
.subj-j-science .subj-progress-fill{background:var(--j-green);}
.subj-j-tamil .subj-progress-fill{background:var(--j-orange);}
.subj-j-iq .subj-progress-fill{background:var(--j-coral);}
.subj-s-maths .subj-progress-fill{background:var(--s-red2);}
.subj-s-english .subj-progress-fill{background:#4da6ff;}
.subj-s-tamil .subj-progress-fill{background:var(--s-gold);}
.subj-s-drawing .subj-progress-fill{background:#00e5e5;}
.subj-s-gk .subj-progress-fill{background:#b06aff;}

/* Bottom nav */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:20;backdrop-filter:blur(20px);border-top:1px solid rgba(255,255,255,.08);display:flex;justify-content:space-around;padding:.55rem 0 calc(.55rem + env(safe-area-inset-bottom));}
.bottom-nav-j{background:rgba(5,10,26,.95);}
.bottom-nav-s{background:rgba(10,0,0,.95);}
.nav-btn{background:none;border:none;color:#8ba3cc;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;font-size:.58rem;font-family:var(--font-body);letter-spacing:1px;padding:.25rem .9rem;transition:color .2s;}
.nav-btn .nav-icon{font-size:18px;}
.nav-btn-j.active{color:var(--j-cyan);}
.nav-btn-s.active{color:var(--s-red2);}

/* ── ACTIVITY LIST ── */
#activity-screen{padding-bottom:5rem;}
.screen-header{padding:1rem 1.5rem;display:flex;align-items:center;gap:1rem;position:sticky;top:0;z-index:10;backdrop-filter:blur(10px);}
.screen-header-j{background:rgba(5,10,26,.92);}
.screen-header-s{background:rgba(10,0,0,.92);}
.back-btn{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:10px;color:#fff;font-size:1.2rem;width:36px;height:36px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.screen-header-title-j{font-family:var(--font-space);font-size:.95rem;font-weight:700;}
.screen-header-title-s{font-family:var(--font-hero);font-size:1.3rem;letter-spacing:2px;}
.activity-list{padding:.5rem 1.5rem;display:flex;flex-direction:column;gap:9px;}
.activity-item{background:var(--card-bg);border:1px solid var(--card-border);border-radius:14px;padding:.9rem 1.1rem;cursor:pointer;display:flex;align-items:center;gap:.9rem;transition:background .2s,transform .15s;}
.activity-item:hover{background:rgba(255,255,255,.07);transform:translateX(4px);}
.act-icon{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
.act-info{flex:1;}
.act-title-j{font-weight:700;font-size:.92rem;margin-bottom:2px;}
.act-title-s{font-family:var(--font-hero);font-size:1.05rem;letter-spacing:1px;margin-bottom:2px;}
.act-meta{font-size:.72rem;color:#8ba3cc;}
.act-locked{opacity:.35;cursor:not-allowed;}
.act-locked:hover{transform:none;}

/* ── PLAYER ── */
#player-screen{padding-bottom:5rem;}
.player-header{padding:.9rem 1.5rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;backdrop-filter:blur(10px);}
.player-header-j{background:rgba(5,10,26,.92);}
.player-header-s{background:rgba(10,0,0,.92);}
.player-title-j{font-family:var(--font-space);font-size:.82rem;font-weight:700;}
.player-title-s{font-family:var(--font-hero);font-size:1.1rem;letter-spacing:1px;}
.player-xp-j{background:rgba(245,200,66,.12);border:1px solid rgba(245,200,66,.3);border-radius:8px;padding:.22rem .55rem;font-size:.72rem;color:var(--j-gold);font-family:var(--font-space);}
.player-xp-s{background:rgba(255,215,0,.12);border:1px solid rgba(255,215,0,.3);border-radius:8px;padding:.22rem .55rem;font-size:.9rem;color:var(--s-gold);font-family:var(--font-hero);letter-spacing:1px;}
.player-body{padding:1rem 1.5rem;}

/* Quiz UI */
.progress-row{display:flex;align-items:center;gap:10px;margin-bottom:1.2rem;}
.progress-bar{flex:1;height:6px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden;}
.progress-fill-j{height:100%;background:linear-gradient(90deg,var(--j-cyan),var(--j-purple));border-radius:3px;transition:width .4s ease;}
.progress-fill-s{height:100%;background:linear-gradient(90deg,var(--s-red2),var(--s-blue2));border-radius:3px;transition:width .4s ease;}
.progress-label{font-size:.72rem;color:#8ba3cc;white-space:nowrap;}
.q-card{border-radius:16px;padding:1.25rem;margin-bottom:1rem;}
.q-card-j{background:var(--card-bg);border:1px solid var(--card-border);}
.q-card-s{background:rgba(204,0,0,.08);border:1px solid rgba(204,0,0,.2);}
.q-text{font-size:1rem;font-weight:700;line-height:1.5;}
.q-text-s{font-family:var(--font-hero);font-size:1.2rem;letter-spacing:1px;line-height:1.4;}
.opts-list{display:flex;flex-direction:column;gap:9px;}
.answer-btn{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.14);color:#fff;font-family:var(--font-body);font-size:.95rem;font-weight:700;cursor:pointer;transition:all .15s;border-radius:12px;padding:.8rem 1.1rem;text-align:left;}
.answer-btn-s{font-family:var(--font-hero);font-size:1.1rem;letter-spacing:1px;}
.answer-btn:hover{background:rgba(255,255,255,.1);transform:scale(1.02);}
.answer-btn.correct{background:rgba(34,197,94,.2);border-color:#22c55e;color:#22c55e;}
.answer-btn.wrong{background:rgba(255,107,107,.2);border-color:#ff6b6b;color:#ff6b6b;animation:shake .3s;}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.feedback-good{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);border-radius:12px;padding:.9rem;text-align:center;font-weight:700;color:#22c55e;margin-top:.9rem;}
.feedback-bad{background:rgba(255,107,107,.1);border:1px solid rgba(255,107,107,.3);border-radius:12px;padding:.9rem;text-align:center;font-weight:700;color:#ff6b6b;margin-top:.9rem;}
.q-expl{background:rgba(0,229,255,.05);border:1px solid rgba(0,229,255,.18);border-radius:10px;padding:.7rem .9rem;margin-top:.6rem;font-size:.82rem;line-height:1.55;color:#cbd5e1;}
.next-btn-j{margin-top:.9rem;width:100%;padding:.85rem;border-radius:12px;border:none;cursor:pointer;background:linear-gradient(135deg,#00e5ff,#a855f7);color:#fff;font-family:var(--font-space);font-size:.82rem;font-weight:700;letter-spacing:1px;transition:transform .15s;}
.next-btn-s{margin-top:.9rem;width:100%;padding:.85rem;border-radius:12px;border:none;cursor:pointer;background:linear-gradient(135deg,#cc0000,#0055aa);color:#fff;font-family:var(--font-hero);font-size:1.1rem;letter-spacing:2px;transition:transform .15s;}
.next-btn-j:hover,.next-btn-s:hover{transform:scale(1.02);}

/* Completion */
.complete-card{text-align:center;padding:2rem 1rem;}
.complete-icon{font-size:68px;margin-bottom:.9rem;animation:pop .4s cubic-bezier(.36,.07,.19,.97);}
@keyframes pop{0%{transform:scale(0)}80%{transform:scale(1.15)}100%{transform:scale(1)}}
.complete-title-j{font-family:var(--font-space);font-size:1.3rem;font-weight:900;color:var(--j-gold);margin-bottom:.5rem;}
.complete-title-s{font-family:var(--font-hero);font-size:2rem;letter-spacing:2px;color:var(--s-red2);margin-bottom:.5rem;}
.complete-score{font-size:.95rem;color:#8ba3cc;margin-bottom:1.2rem;}
.xp-earned-j{display:inline-block;background:rgba(245,200,66,.12);border:1px solid rgba(245,200,66,.3);border-radius:20px;padding:.45rem 1.2rem;font-family:var(--font-space);font-size:1rem;color:var(--j-gold);margin-bottom:1.5rem;}
.xp-earned-s{display:inline-block;background:rgba(255,215,0,.12);border:1px solid rgba(255,215,0,.3);border-radius:20px;padding:.45rem 1.2rem;font-family:var(--font-hero);font-size:1.3rem;letter-spacing:1px;color:var(--s-gold);margin-bottom:1.5rem;}
.home-return-btn-j{width:100%;max-width:260px;padding:.85rem;border-radius:12px;border:none;cursor:pointer;background:linear-gradient(135deg,#f5c842,#ff9f43);color:#000;font-family:var(--font-space);font-size:.8rem;font-weight:700;letter-spacing:1px;}
.home-return-btn-s{width:100%;max-width:260px;padding:.85rem;border-radius:12px;border:none;cursor:pointer;background:linear-gradient(135deg,#cc0000,#0055aa);color:#fff;font-family:var(--font-hero);font-size:1.1rem;letter-spacing:2px;}

/* Progress & Parent screens */
#progress-screen{padding:1rem 1.5rem 6rem;}
#parent-screen{padding:1rem 1.5rem 6rem;}
.progress-screen-title-j{font-family:var(--font-space);font-size:1rem;font-weight:900;color:var(--j-cyan);margin:1rem 0 1.2rem;}
.progress-screen-title-s{font-family:var(--font-hero);font-size:1.5rem;letter-spacing:2px;color:var(--s-red2);margin:1rem 0 1.2rem;}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:1.2rem;}
.stat-card{background:var(--card-bg);border:1px solid var(--card-border);border-radius:14px;padding:.9rem;text-align:center;}
.stat-num-j{font-family:var(--font-space);font-size:1.6rem;font-weight:900;}
.stat-num-s{font-family:var(--font-hero);font-size:2rem;letter-spacing:1px;}
.stat-label{font-size:.68rem;color:#8ba3cc;letter-spacing:1px;margin-top:2px;}
.recent-item{background:var(--card-bg);border:1px solid var(--card-border);border-radius:11px;padding:.65rem .9rem;margin-bottom:7px;display:flex;justify-content:space-between;align-items:center;}
.recent-name{font-size:.82rem;font-weight:600;}
.recent-score-j{font-family:var(--font-space);font-size:.75rem;color:#22c55e;}
.recent-score-s{font-family:var(--font-hero);font-size:.95rem;color:#22c55e;}

/* Parent dashboard */
.parent-login{max-width:300px;margin:2rem auto;text-align:center;}
.parent-title-j{font-family:var(--font-space);font-size:.9rem;color:var(--j-gold);margin-bottom:1.2rem;letter-spacing:2px;}
.parent-title-s{font-family:var(--font-hero);font-size:1.3rem;letter-spacing:2px;color:var(--s-red2);margin-bottom:1.2rem;}
.parent-unlock-btn-j{width:100%;padding:.8rem;border-radius:12px;border:none;cursor:pointer;background:linear-gradient(135deg,#f5c842,#ff9f43);color:#000;font-family:var(--font-space);font-size:.78rem;font-weight:700;letter-spacing:1px;margin-top:.75rem;}
.parent-unlock-btn-s{width:100%;padding:.8rem;border-radius:12px;border:none;cursor:pointer;background:linear-gradient(135deg,#cc0000,#0055aa);color:#fff;font-family:var(--font-hero);font-size:1rem;letter-spacing:2px;margin-top:.75rem;}
.parent-dashboard{display:none;}
.parent-dashboard.visible{display:block;}
.pdash-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:1.2rem;}
.pdash-card-j{background:rgba(245,200,66,.06);border:1px solid rgba(245,200,66,.2);border-radius:14px;padding:.9rem;text-align:center;}
.pdash-card-s{background:rgba(204,0,0,.08);border:1px solid rgba(204,0,0,.25);border-radius:14px;padding:.9rem;text-align:center;}
.pdash-num-j{font-family:var(--font-space);font-size:1.8rem;font-weight:900;color:var(--j-gold);}
.pdash-num-s{font-family:var(--font-hero);font-size:2.2rem;color:var(--s-red2);}
.pdash-label{font-size:.68rem;color:#8ba3cc;letter-spacing:1px;}
.breakdown-row{display:flex;align-items:center;gap:9px;margin-bottom:9px;}
.breakdown-subject{font-size:.75rem;font-weight:600;width:80px;flex-shrink:0;}
.breakdown-bar{flex:1;height:7px;background:rgba(255,255,255,.07);border-radius:4px;overflow:hidden;}
.breakdown-fill{height:100%;border-radius:4px;}
.breakdown-pct{font-size:.68rem;color:#8ba3cc;width:28px;text-align:right;}
.log-table{width:100%;border-collapse:collapse;font-size:.78rem;}
.log-table th{color:#8ba3cc;font-size:.68rem;letter-spacing:1px;text-align:left;padding:.35rem .45rem;border-bottom:1px solid rgba(255,255,255,.07);}
.log-table td{padding:.45rem .45rem;border-bottom:1px solid rgba(255,255,255,.04);}

/* Abacus */
.abacus-wrap{text-align:center;}
.abacus-question{font-size:1.4rem;font-weight:800;margin-bottom:.2rem;}
.abacus-question-s{font-family:var(--font-hero);font-size:1.6rem;letter-spacing:1px;}
.abacus-hint{font-size:.78rem;color:#8ba3cc;margin-bottom:1.2rem;}
.abacus-frame{border-radius:18px;padding:1.1rem .9rem;margin:0 auto 1.2rem;max-width:340px;}
.abacus-frame-j{background:rgba(13,27,62,.8);border:2px solid rgba(255,159,67,.3);}
.abacus-frame-s{background:rgba(26,0,0,.8);border:2px solid rgba(204,0,0,.4);}
.abacus-rod-row{display:flex;align-items:center;gap:5px;margin-bottom:9px;justify-content:center;}
.abacus-label{font-size:.62rem;color:#8ba3cc;width:28px;text-align:right;flex-shrink:0;}
.abacus-rod{display:flex;align-items:center;gap:4px;flex:1;justify-content:flex-start;}
.abacus-bead{width:26px;height:26px;border-radius:50%;cursor:pointer;transition:all .15s;flex-shrink:0;border:2px solid rgba(255,255,255,.12);background:rgba(255,255,255,.05);display:flex;align-items:center;justify-content:center;}
.abacus-bead.active-j{background:var(--j-orange);border-color:rgba(255,159,67,.8);box-shadow:0 0 8px rgba(255,159,67,.5);}
.abacus-bead.active-s{background:var(--s-red2);border-color:rgba(255,26,26,.8);box-shadow:0 0 8px rgba(255,26,26,.5);}
.abacus-bead:hover:not(.active-j):not(.active-s){background:rgba(255,255,255,.1);transform:scale(1.1);}
.abacus-total-j{font-family:var(--font-space);font-size:1.1rem;color:var(--j-cyan);margin-bottom:1rem;}
.abacus-total-s{font-family:var(--font-hero);font-size:1.3rem;color:var(--s-red2);margin-bottom:1rem;letter-spacing:1px;}
.abacus-total span{font-size:1.7rem;font-weight:900;}
.answer-row{display:flex;gap:9px;justify-content:center;flex-wrap:wrap;}

/* Sheet missions */
#sheet-missions-j .mission-card,
#sheet-missions-s .mission-card{cursor:default;}

/* Toast */
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);border-radius:12px;padding:.55rem 1.1rem;font-size:.82rem;opacity:0;transition:all .3s;z-index:100;white-space:nowrap;pointer-events:none;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
#toast.toast-j{background:rgba(13,27,62,.96);border:1px solid rgba(0,229,255,.3);color:var(--j-cyan);}
#toast.toast-s{background:rgba(26,0,0,.96);border:1px solid rgba(204,0,0,.4);color:var(--s-red2);}

@media(min-width:500px){.subject-grid{grid-template-columns:1fr 1fr 1fr;}}
@media(min-width:700px){.home-body,.activity-list,.player-body{max-width:600px;margin-left:auto;margin-right:auto;}}

  /* ══ FULL DAY SCREEN ══ */

  .fd-header{padding:1rem 1.5rem;position:sticky;top:0;z-index:10;backdrop-filter:blur(12px);border-bottom:1px solid var(--card-border);}
  .fd-header-j{background:rgba(5,10,26,.95);}
  .fd-header-s{background:rgba(10,0,0,.95);}
  .fd-toprow{display:flex;align-items:center;gap:.75rem;}
  .fd-title-j{font-family:var(--font-space);font-size:.9rem;font-weight:700;color:var(--j-cyan);flex:1;}
  .fd-title-s{font-family:var(--font-hero);font-size:1.2rem;color:var(--s-red2);flex:1;letter-spacing:1px;}
  .fd-xp{font-family:var(--font-space);font-size:.72rem;color:var(--j-gold);background:rgba(245,200,66,.1);border:1px solid rgba(245,200,66,.25);border-radius:8px;padding:.22rem .55rem;white-space:nowrap;}
  .fd-xp-s{font-family:var(--font-hero);font-size:.9rem;color:var(--s-gold);background:rgba(255,215,0,.1);border:1px solid rgba(255,215,0,.25);border-radius:8px;padding:.22rem .55rem;}
  .fd-daybar{margin-top:.5rem;}
  .fd-daybar-label{display:flex;justify-content:space-between;font-size:.68rem;color:#8ba3cc;margin-bottom:3px;}
  .fd-daybar-outer{height:5px;background:rgba(255,255,255,.07);border-radius:3px;overflow:hidden;}
  .fd-daybar-inner{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--j-cyan),var(--j-purple));transition:width .5s ease;}
  /* Level list */
  .fd-body{padding:.75rem 1.5rem 1rem;}
  .fd-intro-card{border-radius:16px;padding:1.1rem;margin-bottom:1rem;text-align:center;}
  .fd-intro-j{background:linear-gradient(135deg,rgba(0,229,255,.08),rgba(168,85,247,.08));border:1px solid rgba(0,229,255,.15);}
  .fd-intro-s{background:linear-gradient(135deg,rgba(204,0,0,.12),rgba(0,51,102,.12));border:1px solid rgba(204,0,0,.2);}
  .fd-intro-icon{font-size:40px;display:block;margin-bottom:.5rem;}
  .fd-intro-title-j{font-family:var(--font-space);font-size:.9rem;font-weight:900;color:var(--j-cyan);margin-bottom:.25rem;}
  .fd-intro-title-s{font-family:var(--font-hero);font-size:1.3rem;color:var(--s-red2);letter-spacing:1px;margin-bottom:.25rem;}
  .fd-intro-sub{font-size:.78rem;color:#8ba3cc;}
  /* Level cards */
  .fd-level-card{border-radius:14px;padding:.9rem 1.1rem;margin-bottom:8px;cursor:pointer;display:flex;align-items:center;gap:.9rem;transition:all .2s;border:1px solid var(--card-border);background:var(--card-bg);}
  .fd-level-card:hover{transform:translateX(4px);background:rgba(255,255,255,.07);}
  .fd-level-card.locked{opacity:.35;cursor:not-allowed;}
  .fd-level-card.locked:hover{transform:none;}
  .fd-level-card.done{border-color:rgba(34,197,94,.3);}
  .fd-level-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
  .fd-level-info{flex:1;}
  .fd-level-name-j{font-weight:800;font-size:.9rem;margin-bottom:2px;}
  .fd-level-name-s{font-family:var(--font-hero);font-size:1rem;letter-spacing:1px;margin-bottom:2px;}
  .fd-level-meta{font-size:.72rem;color:#8ba3cc;}
  .fd-level-xp{font-family:var(--font-space);font-size:.68rem;color:var(--j-gold);white-space:nowrap;}
  /* Player inner */
  #fd-player-screen{padding-bottom:5rem;}
  .fd-player-header{padding:.9rem 1.5rem;display:flex;align-items:center;gap:.75rem;position:sticky;top:0;z-index:10;backdrop-filter:blur(12px);border-bottom:1px solid var(--card-border);}
  .fd-player-header-j{background:rgba(5,10,26,.95);}
  .fd-player-header-s{background:rgba(10,0,0,.95);}
  .fd-player-body{padding:1rem 1.5rem;}
  /* Teach block */
  .fd-teach{border-radius:14px;padding:1.1rem;margin-bottom:.9rem;border:1px solid;}
  .fd-teach-cyan{background:rgba(0,229,255,.05);border-color:rgba(0,229,255,.18);}
  .fd-teach-purple{background:rgba(168,85,247,.05);border-color:rgba(168,85,247,.18);}
  .fd-teach-green{background:rgba(34,197,94,.05);border-color:rgba(34,197,94,.18);}
  .fd-teach-gold{background:rgba(245,200,66,.05);border-color:rgba(245,200,66,.18);}
  .fd-teach-coral{background:rgba(255,107,107,.05);border-color:rgba(255,107,107,.18);}
  .fd-teach-teal{background:rgba(20,184,166,.05);border-color:rgba(20,184,166,.18);}
  .fd-teach-indigo{background:rgba(99,102,241,.05);border-color:rgba(99,102,241,.18);}
  .fd-teach-pink{background:rgba(244,114,182,.05);border-color:rgba(244,114,182,.18);}
  .fd-teach-orange{background:rgba(255,159,67,.05);border-color:rgba(255,159,67,.18);}
  .fd-teach-label{font-family:var(--font-space);font-size:.65rem;letter-spacing:2px;text-transform:uppercase;margin-bottom:.6rem;}
  .fd-teach-label.cyan{color:var(--j-cyan);}
  .fd-teach-label.purple{color:var(--j-purple);}
  .fd-teach-label.green{color:var(--j-green);}
  .fd-teach-label.gold{color:var(--j-gold);}
  .fd-teach-label.coral{color:var(--j-coral);}
  .fd-teach-label.teal{color:var(--teal, #14b8a6);}
  .fd-teach-label.indigo{color:#6366f1;}
  .fd-teach-label.pink{color:#f472b6;}
  .fd-teach-label.orange{color:var(--j-orange);}
  .fd-teach-content{font-size:.87rem;line-height:1.75;color:#e2e8f0;}
  .fd-teach-content b{color:#fff;}
  .fd-example{display:block;margin:.4rem 0;padding:.4rem .7rem;background:rgba(255,255,255,.04);border-radius:7px;border-left:2px solid rgba(255,255,255,.15);font-family:monospace;font-size:.82rem;}
  .fd-trick{background:rgba(245,200,66,.07);border:1px solid rgba(245,200,66,.18);border-radius:10px;padding:.65rem .9rem;margin:.65rem 0;font-size:.83rem;line-height:1.6;}
  .fd-trick-label{font-family:var(--font-space);font-size:.62rem;color:var(--j-gold);letter-spacing:1px;margin-bottom:.25rem;}
  /* Divider */
  .fd-divider{display:flex;align-items:center;gap:.65rem;margin:1rem 0 .85rem;}
  .fd-divider-line{flex:1;height:1px;background:var(--card-border);}
  .fd-divider-text{font-family:var(--font-space);font-size:.6rem;color:#8ba3cc;letter-spacing:2px;white-space:nowrap;}
  /* Quiz */
  .fd-qprog{display:flex;align-items:center;gap:9px;margin-bottom:.9rem;}
  .fd-qpb{flex:1;height:5px;background:rgba(255,255,255,.07);border-radius:3px;overflow:hidden;}
  .fd-qpb-fill{height:100%;border-radius:3px;transition:width .4s ease;}
  .fd-q-card{border-radius:14px;padding:1rem;margin-bottom:.8rem;background:var(--card-bg);border:1px solid var(--card-border);}
  .fd-q-num{font-family:var(--font-space);font-size:.62rem;color:#8ba3cc;letter-spacing:1px;margin-bottom:.35rem;}
  .fd-q-text{font-size:.98rem;font-weight:700;line-height:1.5;}
  .fd-opts{display:flex;flex-direction:column;gap:7px;margin-bottom:.7rem;}
  .fd-opt{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);color:#fff;font-family:var(--font-body);font-size:.9rem;font-weight:700;cursor:pointer;transition:all .15s;border-radius:11px;padding:.72rem 1rem;text-align:left;width:100%;}
  .fd-opt:hover:not(:disabled){background:rgba(255,255,255,.1);transform:translateX(3px);}
  .fd-opt.correct{background:rgba(34,197,94,.18);border-color:var(--j-green);color:var(--j-green);}
  .fd-opt.wrong{background:rgba(255,107,107,.15);border-color:var(--j-coral);color:var(--j-coral);animation:shake .3s;}
  .fd-feedback{border-radius:11px;padding:.8rem;margin:.45rem 0;font-size:.83rem;line-height:1.6;}
  .fd-feedback.good{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.22);color:var(--j-green);}
  .fd-feedback.bad{background:rgba(255,107,107,.1);border:1px solid rgba(255,107,107,.22);color:var(--j-coral);}
  .fd-next-btn{width:100%;padding:.82rem;border-radius:11px;border:none;cursor:pointer;color:#fff;font-family:var(--font-space);font-size:.78rem;font-weight:700;letter-spacing:1px;transition:transform .15s;margin-top:.45rem;}
  .fd-next-btn:hover{transform:scale(1.02);}
  /* Section complete */
  .fd-sec-complete{text-align:center;padding:1.5rem 1rem;}
  .fd-sc-icon{font-size:52px;margin-bottom:.7rem;display:block;animation:pop .4s cubic-bezier(.36,.07,.19,.97);}
  .fd-sc-title-j{font-family:var(--font-space);font-size:1rem;font-weight:900;color:var(--j-gold);margin-bottom:.35rem;}
  .fd-sc-title-s{font-family:var(--font-hero);font-size:1.4rem;color:var(--s-red2);letter-spacing:1px;margin-bottom:.35rem;}
  .fd-sc-score{font-size:.88rem;color:#8ba3cc;margin-bottom:.9rem;}
  .fd-sc-xp{font-family:var(--font-space);font-size:.95rem;color:var(--j-gold);background:rgba(245,200,66,.1);border:1px solid rgba(245,200,66,.22);border-radius:16px;padding:.35rem 1rem;display:inline-block;margin-bottom:1.25rem;}
  .fd-learned{background:var(--card-bg);border:1px solid var(--card-border);border-radius:12px;padding:.9rem;text-align:left;margin-bottom:1.25rem;}
  .fd-learned-title{font-family:var(--font-space);font-size:.62rem;color:var(--j-cyan);letter-spacing:2px;margin-bottom:.5rem;}
  .fd-learned-item{font-size:.8rem;color:#8ba3cc;padding:.25rem 0;border-bottom:1px solid var(--card-border);line-height:1.5;}
  .fd-learned-item:last-child{border:none;}
  .fd-continue-btn{width:100%;max-width:260px;padding:.85rem;border-radius:13px;border:none;cursor:pointer;background:linear-gradient(135deg,var(--j-cyan),var(--j-purple));color:#fff;font-family:var(--font-space);font-size:.82rem;font-weight:700;letter-spacing:1px;transition:transform .15s;}
  .fd-continue-btn:hover{transform:scale(1.02);}
  /* Break */
  .fd-break-body{text-align:center;padding:2.5rem 1.5rem;}
  .fd-break-timer{font-family:var(--font-space);font-size:2.2rem;font-weight:900;color:var(--j-cyan);margin:1rem 0;}
  /* Final */
  .fd-final{text-align:center;padding:2rem 1.5rem;}
  .fd-final-trophy{font-size:72px;display:block;margin-bottom:.9rem;animation:float 3s ease-in-out infinite;}
  .fd-final-title-j{font-family:var(--font-space);font-size:1.2rem;font-weight:900;color:var(--j-gold);margin-bottom:.4rem;letter-spacing:1px;}
  .fd-cert{background:linear-gradient(135deg,rgba(13,27,62,.95),rgba(26,58,110,.95));border:1px solid rgba(245,200,66,.3);border-radius:18px;padding:1.4rem;margin:1.25rem 0;}
  .fd-cert-label{font-family:var(--font-space);font-size:.65rem;color:var(--j-gold);letter-spacing:2px;margin-bottom:.4rem;}
  .fd-cert-name{font-family:var(--font-space);font-size:1rem;font-weight:900;color:#fff;margin-bottom:.25rem;}
  .fd-cert-text{font-size:.78rem;color:#8ba3cc;line-height:1.5;}
  .fd-stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:1.25rem;}
  .fd-stat{background:var(--card-bg);border:1px solid var(--card-border);border-radius:12px;padding:.85rem;text-align:center;}
  .fd-stat-num{font-family:var(--font-space);font-size:1.5rem;font-weight:900;}
  .fd-stat-label{font-size:.66rem;color:#8ba3cc;letter-spacing:1px;margin-top:2px;}
  /* XP popup */
  #fd-xp-pop{position:fixed;bottom:100px;right:16px;background:rgba(245,200,66,.15);border:1px solid rgba(245,200,66,.4);border-radius:9px;padding:.35rem .75rem;font-family:var(--font-space);font-size:.82rem;color:var(--j-gold);opacity:0;transition:all .35s;z-index:200;pointer-events:none;}
  #fd-xp-pop.show{opacity:1;transform:translateY(-8px);}
  /* Miss teal var */
  :root{--teal:#14b8a6;}


  /* ══ FULL DAY ══ */
  #fd-screen{padding-bottom:5rem;}
  .fd-topbar{padding:1rem 1.5rem;position:sticky;top:0;z-index:10;backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,.08);}
  .fd-topbar-j{background:rgba(5,10,26,.95);}
  .fd-top-row{display:flex;align-items:center;gap:.75rem;}
  .fd-screen-title{font-family:var(--font-space);font-size:.88rem;font-weight:700;flex:1;color:var(--j-cyan);}
  .fd-day-xp{font-family:var(--font-space);font-size:.7rem;color:var(--j-gold);background:rgba(245,200,66,.1);border:1px solid rgba(245,200,66,.25);border-radius:8px;padding:.2rem .55rem;white-space:nowrap;}
  .fd-bar-wrap{margin-top:.5rem;}
  .fd-bar-labels{display:flex;justify-content:space-between;font-size:.66rem;color:#8ba3cc;margin-bottom:3px;}
  .fd-bar-outer{height:5px;background:rgba(255,255,255,.07);border-radius:3px;overflow:hidden;}
  .fd-bar-inner{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--j-cyan),var(--j-purple));transition:width .5s;}
  .fd-body{padding:.75rem 1.5rem 1rem;}
  .fd-intro{border-radius:16px;padding:1.1rem;margin-bottom:1rem;text-align:center;background:linear-gradient(135deg,rgba(0,229,255,.08),rgba(168,85,247,.08));border:1px solid rgba(0,229,255,.15);}
  .fd-intro-icon{font-size:36px;display:block;margin-bottom:.4rem;}
  .fd-intro-title{font-family:var(--font-space);font-size:.88rem;font-weight:900;color:var(--j-cyan);margin-bottom:.2rem;}
  .fd-intro-sub{font-size:.75rem;color:#8ba3cc;}
  .fd-lev-card{border-radius:13px;padding:.85rem 1rem;margin-bottom:8px;cursor:pointer;display:flex;align-items:center;gap:.85rem;transition:all .18s;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);}
  .fd-lev-card:hover{background:rgba(255,255,255,.08);transform:translateX(4px);}
  .fd-lev-card.fd-done{border-color:rgba(34,197,94,.3);}
  .fd-lev-card.fd-locked{opacity:.35;cursor:not-allowed;}
  .fd-lev-card.fd-locked:hover{transform:none;}
  .fd-lev-icon{width:42px;height:42px;border-radius:10px;background:rgba(255,255,255,.05);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
  .fd-lev-info{flex:1;}
  .fd-lev-name{font-weight:800;font-size:.88rem;margin-bottom:2px;}
  .fd-lev-meta{font-size:.7rem;color:#8ba3cc;}
  .fd-lev-xp{font-family:var(--font-space);font-size:.66rem;color:var(--j-gold);white-space:nowrap;}
  /* Player */
  #fd-player{padding-bottom:5rem;}

  /* Teach */
  .fd-teach{border-radius:13px;padding:1rem;margin-bottom:.85rem;border:1px solid;}
  .fd-teach.c-cyan{background:rgba(0,229,255,.05);border-color:rgba(0,229,255,.18);}
  .fd-teach.c-teal{background:rgba(20,184,166,.05);border-color:rgba(20,184,166,.18);}

  .fd-teach.c-gold{background:rgba(245,200,66,.05);border-color:rgba(245,200,66,.18);}
  .fd-teach.c-coral{background:rgba(255,107,107,.05);border-color:rgba(255,107,107,.18);}
  .fd-teach.c-indigo{background:rgba(99,102,241,.05);border-color:rgba(99,102,241,.18);}
  .fd-teach.c-pink{background:rgba(244,114,182,.05);border-color:rgba(244,114,182,.18);}
  .fd-teach.c-orange{background:rgba(255,159,67,.05);border-color:rgba(255,159,67,.18);}
  .fd-teach-lbl{font-family:var(--font-space);font-size:.62rem;letter-spacing:2px;text-transform:uppercase;margin-bottom:.55rem;}
  .fd-teach-lbl.c-cyan{color:var(--j-cyan);}
  .fd-teach-lbl.c-teal{color:#14b8a6;}
  .fd-teach-lbl.c-purple{color:var(--j-purple);}
  .fd-teach-lbl.c-green{color:var(--j-green);}
  .fd-teach-lbl.c-gold{color:var(--j-gold);}
  .fd-teach-lbl.c-coral{color:var(--j-coral);}
  .fd-teach-lbl.c-indigo{color:#6366f1;}
  .fd-teach-lbl.c-pink{color:#f472b6;}
  .fd-teach-lbl.c-orange{color:var(--j-orange);}
  .fd-content{font-size:.85rem;line-height:1.75;color:#e2e8f0;}
  .fd-content b{color:#fff;}
  .fd-ex{display:block;margin:.35rem 0;padding:.4rem .65rem;background:rgba(255,255,255,.04);border-radius:6px;border-left:2px solid rgba(255,255,255,.15);font-family:monospace;font-size:.8rem;}
  .fd-trick{background:rgba(245,200,66,.07);border:1px solid rgba(245,200,66,.18);border-radius:9px;padding:.6rem .85rem;margin:.6rem 0;font-size:.82rem;line-height:1.6;}
  .fd-trick-lbl{font-family:var(--font-space);font-size:.6rem;color:var(--j-gold);letter-spacing:1px;margin-bottom:.2rem;}
  .fd-div{display:flex;align-items:center;gap:.6rem;margin:.9rem 0 .75rem;}
  .fd-div-line{flex:1;height:1px;background:rgba(255,255,255,.08);}
  .fd-div-txt{font-family:var(--font-space);font-size:.58rem;color:#8ba3cc;letter-spacing:2px;white-space:nowrap;}
  /* Quiz */
  .fd-qprog{display:flex;align-items:center;gap:8px;margin-bottom:.85rem;}
  .fd-qpb{flex:1;height:4px;background:rgba(255,255,255,.07);border-radius:2px;overflow:hidden;}
  .fd-qpb-fill{height:100%;border-radius:2px;transition:width .4s;}
  .fd-qlabel{font-size:.68rem;color:#8ba3cc;white-space:nowrap;}
  .fd-qcard{border-radius:13px;padding:.95rem;margin-bottom:.75rem;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);}
  .fd-qnum{font-family:var(--font-space);font-size:.6rem;color:#8ba3cc;letter-spacing:1px;margin-bottom:.3rem;}
  .fd-qtext{font-size:.96rem;font-weight:700;line-height:1.5;}
  .fd-opts{display:flex;flex-direction:column;gap:7px;}
  .fd-opt{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.11);color:#fff;font-family:var(--font-body);font-size:.88rem;font-weight:700;cursor:pointer;transition:all .15s;border-radius:10px;padding:.7rem .95rem;text-align:left;width:100%;}
  .fd-opt:hover:not(:disabled){background:rgba(255,255,255,.1);transform:translateX(3px);}
  .fd-opt.correct{background:rgba(34,197,94,.18);border-color:var(--j-green);color:var(--j-green);}
  .fd-opt.wrong{background:rgba(255,107,107,.15);border-color:var(--j-coral);color:var(--j-coral);animation:shake .3s;}
  .fd-fb{border-radius:10px;padding:.75rem;margin:.4rem 0;font-size:.82rem;line-height:1.6;}
  .fd-fb.good{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.22);color:var(--j-green);}
  .fd-fb.bad{background:rgba(255,107,107,.1);border:1px solid rgba(255,107,107,.22);color:var(--j-coral);}
  .fd-nxt{width:100%;padding:.8rem;border-radius:10px;border:none;cursor:pointer;color:#fff;font-family:var(--font-space);font-size:.75rem;font-weight:700;letter-spacing:1px;transition:transform .15s;margin-top:.4rem;}
  .fd-nxt:hover{transform:scale(1.02);}
  /* Section complete */
  .fd-scomp{text-align:center;padding:1.5rem 1rem;}
  .fd-scomp-icon{font-size:52px;margin-bottom:.65rem;display:block;animation:pop .4s cubic-bezier(.36,.07,.19,.97);}
  .fd-scomp-title{font-family:var(--font-space);font-size:.95rem;font-weight:900;color:var(--j-gold);margin-bottom:.3rem;}

  .fd-scomp-xp{font-family:var(--font-space);font-size:.9rem;color:var(--j-gold);background:rgba(245,200,66,.1);border:1px solid rgba(245,200,66,.22);border-radius:14px;padding:.3rem .9rem;display:inline-block;margin-bottom:1.1rem;}
  .fd-learned{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:11px;padding:.85rem;text-align:left;margin-bottom:1.1rem;}
  .fd-learned-title{font-family:var(--font-space);font-size:.6rem;color:var(--j-cyan);letter-spacing:2px;margin-bottom:.45rem;}
  .fd-learned-item{font-size:.78rem;color:#8ba3cc;padding:.22rem 0;border-bottom:1px solid rgba(255,255,255,.06);line-height:1.5;}
  .fd-learned-item:last-child{border:none;}
  .fd-cont-btn{width:100%;max-width:240px;padding:.82rem;border-radius:12px;border:none;cursor:pointer;background:linear-gradient(135deg,var(--j-cyan),var(--j-purple));color:#fff;font-family:var(--font-space);font-size:.78rem;font-weight:700;letter-spacing:1px;transition:transform .15s;}
  .fd-cont-btn:hover{transform:scale(1.02);}
  /* Break */
  .fd-break{text-align:center;padding:2rem 1.5rem;}
  .fd-break-timer{font-family:var(--font-space);font-size:2.2rem;font-weight:900;color:var(--j-cyan);margin:1rem 0;}
  /* Final */
  .fd-final{text-align:center;padding:2rem 1rem;}
  .fd-final-icon{font-size:68px;display:block;margin-bottom:.85rem;animation:float 3s ease-in-out infinite;}
  .fd-final-title{font-family:var(--font-space);font-size:1.1rem;font-weight:900;color:var(--j-gold);letter-spacing:1px;margin-bottom:.4rem;}
  .fd-stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin:1rem 0;}
  .fd-stat{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:.85rem;text-align:center;}
  .fd-stat-n{font-family:var(--font-space);font-size:1.5rem;font-weight:900;}
  .fd-stat-l{font-size:.65rem;color:#8ba3cc;letter-spacing:1px;margin-top:2px;}
  .fd-cert{background:linear-gradient(135deg,rgba(13,27,62,.95),rgba(26,58,110,.95));border:1px solid rgba(245,200,66,.3);border-radius:16px;padding:1.25rem;margin:1rem 0;}
  .fd-cert-lbl{font-family:var(--font-space);font-size:.62rem;color:var(--j-gold);letter-spacing:2px;margin-bottom:.35rem;}
  .fd-cert-name{font-family:var(--font-space);font-size:.95rem;font-weight:900;color:#fff;margin-bottom:.2rem;}
  .fd-cert-txt{font-size:.75rem;color:#8ba3cc;line-height:1.5;}
  /* XP popup */
  #fd-xp-pop{position:fixed;bottom:100px;right:14px;background:rgba(245,200,66,.15);border:1px solid rgba(245,200,66,.4);border-radius:9px;padding:.32rem .7rem;font-family:var(--font-space);font-size:.8rem;color:var(--j-gold);opacity:0;transition:all .35s;z-index:300;pointer-events:none;}
  #fd-xp-pop.show{opacity:1;transform:translateY(-8px);}
  @media(min-width:700px){.fd-body,.fd-player-body{max-width:600px;margin-left:auto;margin-right:auto;}}

</style>
</head>

<script>
// ═══════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════
const PROFILES = {
  j: { name:'Jaishnav', nick:'Jaishnav', pwd:'Jaishnav@123', grade:'Grade 4', theme:'j', avatar:'🚀', stateKey:'state_jaishnav' },
  s: { name:'Shakshu',  nick:'Shakshu',  pwd:'Shakshi@123',  grade:'Grade 2', theme:'s', avatar:'🕷️', stateKey:'state_shakshu'  }
};
const PARENT_PWD  = 'Parent@999';
const SHEETS_URL  = 'https://script.google.com/macros/s/AKfycbyvF0Hq-nGvp6NvNJdRQMOVvyPBLtUpfpQ7YQBJCTqqktdh3pHDP1qcd_qbLESxMOEj2g/exec';

let currentProfile = null;
let state = { xp:0, streak:0, log:[], completed:{} };

// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
function loadState()  { try { const s=localStorage.getItem(currentProfile.stateKey); if(s) state=JSON.parse(s); } catch(e){} }
function saveState()  { try { localStorage.setItem(currentProfile.stateKey, JSON.stringify(state)); } catch(e){} }

// ═══════════════════════════════════════════════
// BACKGROUNDS
// ═══════════════════════════════════════════════
(function buildSpaceStars(){
  const bg=document.getElementById('bg-j');
  for(let i=0;i<160;i++){
    const s=document.createElement('div'); s.className='star';
    const sz=Math.random()*2.5+.5;
    s.style.cssText=`width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--d:${2+Math.random()*4}s;--o:${.4+Math.random()*.6};animation-delay:${Math.random()*5}s`;
    bg.appendChild(s);
  }
  ['rgba(0,229,255','rgba(168,85,247','rgba(245,200,66'].forEach(c=>{
    const n=document.createElement('div'); n.className='nebula';
    n.style.cssText=`width:${220+Math.random()*280}px;height:${220+Math.random()*280}px;top:${Math.random()*100}%;left:${Math.random()*100}%;background:${c},.5)`;
    bg.appendChild(n);
  });
})();

(function buildWebLines(){
  const bg=document.getElementById('bg-s');
  // Draw spider web effect with div lines
  for(let i=0;i<12;i++){
    const line=document.createElement('div'); line.className='web-line';
    const angle=i*(180/12);
    const len=Math.sqrt(window.innerWidth**2+window.innerHeight**2);
    line.style.cssText=`width:1px;height:${len}px;top:0;left:50%;transform:rotate(${angle}deg);transform-origin:top center;`;
    bg.appendChild(line);
  }
  // Concentric arcs (circles)
  [80,160,260,380,520].forEach(r=>{
    const c=document.createElement('div');
    c.style.cssText=`position:absolute;border:1px solid rgba(255,255,255,0.05);border-radius:50%;width:${r*2}px;height:${r*2}px;top:50%;left:50%;transform:translate(-50%,-50%);`;
    bg.appendChild(c);
  });
})();

function resetBg(){
  document.getElementById('bg-j').style.display='none';
  document.getElementById('bg-s').style.display='none';
  document.body.style.background='#050a1a';
}

function applyTheme(t){
  document.getElementById('bg-j').style.display = t==='j'?'block':'none';
  document.getElementById('bg-s').style.display = t==='s'?'block':'none';
  document.body.style.background = t==='j'?'var(--j-dark)':'var(--s-dark)';
}

// ═══════════════════════════════════════════════
// SCREENS & NAV
// ═══════════════════════════════════════════════
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}
function setActiveNav(id){
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active','nav-btn-j','nav-btn-s'));
  const btn=document.getElementById(id);
  if(btn){
    btn.classList.add('active');
    btn.classList.add(currentProfile?.theme==='s'?'nav-btn-s':'nav-btn-j');
  }
}

// ═══════════════════════════════════════════════
// PROFILE SELECT & LOGIN
// ═══════════════════════════════════════════════
function selectProfile(key){
  currentProfile = PROFILES[key];
  const t = currentProfile.theme;
  applyTheme(t);
  // Style login screen
  const card = document.getElementById('login-card');
  card.className = `login-card login-card-${t}`;
  document.getElementById('login-avatar').textContent = currentProfile.avatar;
  if(t==='j'){
    document.getElementById('login-title').className='login-title-j';
    document.getElementById('login-title').textContent='SPACE ACADEMY';
    document.getElementById('login-btn').className='login-btn-j';
    document.getElementById('login-btn').textContent='LAUNCH ›';
    document.getElementById('pwd-input').className='login-input';
  } else {
    document.getElementById('login-title').className='login-title-s';
    document.getElementById('login-title').textContent='HERO HQ';
    document.getElementById('login-btn').className='login-btn-s';
    document.getElementById('login-btn').textContent='SUIT UP!';
    document.getElementById('pwd-input').className='login-input login-input-s';
    document.getElementById('pwd-input').style.borderColor='rgba(204,0,0,.3)';
  }
  document.getElementById('login-sub').textContent = `Enter your secret code, ${currentProfile.nick}!`;
  document.getElementById('pwd-input').value='';
  document.getElementById('login-error').textContent='';
  showScreen('login-screen');
}

function tryLogin(){
  const v=document.getElementById('pwd-input').value;
  if(v===currentProfile.pwd){
    loadState(); renderHomeForProfile(); fetchAssignments();
    showScreen('home-screen');
    showToast('Welcome back, '+currentProfile.nick+'! '+currentProfile.avatar);
  } else {
    document.getElementById('login-error').textContent='Wrong password! Try again.';
    document.getElementById('pwd-input').value='';
    setTimeout(()=>document.getElementById('login-error').textContent='',2000);
  }
}
document.getElementById('pwd-input').addEventListener('keydown',e=>{if(e.key==='Enter')tryLogin();});

// ═══════════════════════════════════════════════
// RENDER HOME
// ═══════════════════════════════════════════════
function renderHomeForProfile(){
  const t=currentProfile.theme;
  const p=currentProfile;
  // Header
  document.getElementById('home-header').className=`home-header home-header-${t}`;
  document.getElementById('home-greeting').className=`home-greeting home-greeting-${t}`;
  document.getElementById('home-hey').textContent=t==='j'?'WELCOME BACK, EXPLORER':'HEY SUPERHERO!';
  document.getElementById('home-name').textContent=p.nick+(t==='j'?' 🌟':' 🕷️');
  // XP badge
  const xpb=document.getElementById('xp-badge');
  xpb.className=`xp-badge-${t}`;
  xpb.innerHTML=`<span>⭐</span><span id="xp-display">${state.xp} XP</span>`;
  // Streak
  const dots=document.getElementById('streak-dots'); dots.innerHTML='';
  for(let i=0;i<7;i++){
    const d=document.createElement('div');
    d.className=`streak-dot streak-dot-${t}`+(i<state.streak?' lit':'');
    dots.appendChild(d);
  }
  // Nav
  const nav=document.getElementById('home-nav');
  nav.className=`bottom-nav bottom-nav-${t}`;
  ['act-nav','player-nav','prog-nav','par-nav'].forEach(id=>{
    const n=document.getElementById(id);
    if(n) n.className=`bottom-nav bottom-nav-${t}`;
  });
  // Build body
  const body=document.getElementById('home-body');
  const cat=t==='j'?catalogJ:catalogS;
  const fdNavBtn=document.getElementById('nav-fullday');
  if(fdNavBtn) fdNavBtn.style.display = t==='j'?'flex':'none';
  const missionCard=t==='j'
    ?`<div class="mission-card mission-card-j" onclick="openActivity('maths','abacus')">
        <div class="mission-tag-j">DAILY CHALLENGE</div>
        <div class="mission-title">Abacus Maths Master</div>
        <div class="mission-sub">Use the abacus to solve addition problems</div>
        <div class="mission-xp-j">+30 XP</div>
      </div>`
    :`<div class="mission-card mission-card-s" onclick="openActivity('maths','count')">
        <div class="mission-tag-s">TODAY'S MISSION</div>
        <div class="mission-title" style="font-family:var(--font-hero);letter-spacing:1px">Counting Adventure!</div>
        <div class="mission-sub">Count objects and match numbers</div>
        <div class="mission-xp-s">+20 XP</div>
      </div>`;

  let subjectGrid='<div class="subject-grid">';
  Object.entries(cat).forEach(([key,subj])=>{
    const done=Object.keys(state.completed).filter(k=>k.startsWith(key+'_')).length;
    const total=subj.activities.length;
    const pct=Math.round((done/total)*100);
    subjectGrid+=`<div class="subject-card subj-${t}-${key}" onclick="openSubject('${key}')">
      <div>
        <span class="subj-icon">${subj.icon}</span>
        <div class="subj-name">${subj.name}</div>
        <div class="subj-count">${total} activities</div>
      </div>
      <div class="subj-progress"><div class="subj-progress-fill" style="width:${pct}%"></div></div>
    </div>`;
  });
  subjectGrid+='</div>';

  const sectionClass=t==='j'?'section-title section-title-j':'section-title section-title-s';
  const missionLabel=t==='j'?"📡 Today's Mission":"🕷️ Today's Mission";
  const missionControl=t==='j'?"🪐 Mission Control":"🦸 Hero Training";

  body.innerHTML=`
    <div id="sheet-missions-${t}"></div>
    <div class="${sectionClass}">${missionLabel}</div>
    ${missionCard}
    <div class="${sectionClass}">${missionControl}</div>
    ${subjectGrid}`;
}

// ABACUS (Jaishnav only)
// ═══════════════════════════════════════════════
const abacusQs=[{q:'3 + 4',a:7},{q:'5 + 6',a:11},{q:'8 + 3',a:11},{q:'7 + 5',a:12},{q:'9 + 6',a:15},{q:'12 + 8',a:20},{q:'15 + 7',a:22}];
let abacusState={qi:0,score:0,answered:false,beadMap:{}};

function renderAbacus(body){
  abacusState={qi:0,score:0,answered:false,beadMap:{}};
  renderAbacusQ(body);
}
function renderAbacusQ(body){
  const t=currentProfile.theme;
  const total=abacusQs.length; const qi=abacusState.qi;
  if(qi>=total){showCompletion(body,abacusState.score,total);return;}
  const q=abacusQs[qi]; abacusState.answered=false; abacusState.beadMap={};
  const opts=shuffle([q.a,...[q.a-3,q.a+2,q.a-1,q.a+3].filter(x=>x>0&&x!==q.a)]).slice(0,3);
  body.innerHTML=`
    <div class="progress-row">
      <div class="progress-bar"><div class="progress-fill-${t}" style="width:${(qi/total)*100}%"></div></div>
      <div class="progress-label">${qi+1}/${total}</div>
    </div>
    <div class="abacus-wrap">
      <div class="abacus-question abacus-question-${t}">What is ${q.q}?</div>
      <div class="abacus-hint">Tap beads to count, then pick your answer</div>
      <div class="abacus-frame abacus-frame-${t}">
        <div class="abacus-rod-row"><div class="abacus-label">Tens</div><div class="abacus-rod" id="rod-tens">${buildRod('tens',10,t)}</div></div>
        <div class="abacus-rod-row"><div class="abacus-label">Ones</div><div class="abacus-rod" id="rod-ones">${buildRod('ones',10,t)}</div></div>
      </div>
      <div class="abacus-total-${t}">Count: <span id="abacus-count">0</span></div>
      <div class="answer-row" id="answer-row">
        ${opts.map(o=>`<button class="answer-btn${t==='s'?' answer-btn-s':''}" onclick="checkAbacus(${o},${q.a},this)">${o}</button>`).join('')}
      </div>
      <div id="abacus-feedback"></div>
    </div>`;
  document.querySelectorAll('.abacus-bead').forEach(b=>{
    b.addEventListener('click',function(){
      if(abacusState.answered)return;
      const key=this.dataset.rod+'_'+this.dataset.idx;
      abacusState.beadMap[key]=!abacusState.beadMap[key];
      this.classList.toggle('active-'+t);
      document.getElementById('abacus-count').textContent=document.querySelectorAll('.abacus-bead.active-'+t).length;
    });
  });
}
function buildRod(rod,n,t){
  let h='';
  for(let i=0;i<n;i++) h+=`<div class="abacus-bead" data-rod="${rod}" data-idx="${i}"></div>`;
  return h;
}
function checkAbacus(chosen,correct,btn){
  if(abacusState.answered)return;
  abacusState.answered=true;
  const t=currentProfile.theme;
  document.querySelectorAll('#answer-row .answer-btn').forEach(b=>b.disabled=true);
  const fb=document.getElementById('abacus-feedback');
  if(chosen===correct){btn.classList.add('correct');abacusState.score++;fb.innerHTML='<div class="feedback-good">⭐ Brilliant!</div>';}
  else{btn.classList.add('wrong');document.querySelectorAll('#answer-row .answer-btn').forEach(b=>{if(parseInt(b.textContent)===correct)b.classList.add('correct');});fb.innerHTML=`<div class="feedback-bad">The answer was ${correct}. Keep trying! 💪</div>`;}
  fb.innerHTML+=`<button class="next-btn-${t}" onclick="abacusState.qi++;renderAbacusQ(document.getElementById('player-body'))">${abacusState.qi+1>=abacusQs.length?'See Results 🎉':'Next →'}</button>`;
}

// GENERIC QUIZ
// ═══════════════════════════════════════════════
let quizState={questions:[],qi:0,score:0,answered:false};

function renderQuiz(body,bank){
  quizState={questions:shuffle([...bank]).slice(0,Math.min(6,bank.length)),qi:0,score:0,answered:false};
  renderQuizQ(body);
}
function renderQuizQ(body){
  const t=currentProfile.theme;
  const qs=quizState.questions; const qi=quizState.qi;
  if(qi>=qs.length){showCompletion(body,quizState.score,qs.length);return;}
  const q=qs[qi]; quizState.answered=false;
  body.innerHTML=`
    <div class="progress-row">
      <div class="progress-bar"><div class="progress-fill-${t}" style="width:${(qi/qs.length)*100}%"></div></div>
      <div class="progress-label">${qi+1}/${qs.length}</div>
    </div>
    <div class="q-card q-card-${t}">
      <div class="q-text${t==='s'?' q-text-s':''}">${q.q}</div>
    </div>
    <div class="opts-list" id="opts-list">
      ${q.opts.map((o,i)=>`<button class="answer-btn${t==='s'?' answer-btn-s':''}" onclick="checkQuiz(${i},${q.a},this)">${o}</button>`).join('')}
    </div>
    <div id="quiz-feedback" style="margin-top:.9rem"></div>`;
}
function checkQuiz(chosen,correct,btn){
  if(quizState.answered)return;
  quizState.answered=true;
  const t=currentProfile.theme;
  document.querySelectorAll('#opts-list .answer-btn').forEach(b=>b.disabled=true);
  const fb=document.getElementById('quiz-feedback');
  const curQ=quizState.questions[quizState.qi];
  const expl=curQ.e?`<div class="q-expl">💡 ${curQ.e}</div>`:'';
  if(chosen===correct){
    btn.classList.add('correct'); quizState.score++;
    fb.innerHTML=`<div class="feedback-good">${t==='s'?'🕷️ Amazing, Superhero!':'⭐ Correct! Well done!'}</div>${expl}`;
  } else {
    btn.classList.add('wrong');
    document.querySelectorAll('#opts-list .answer-btn')[correct].classList.add('correct');
    fb.innerHTML=`<div class="feedback-bad">Not quite! Answer: <b>${curQ.opts[correct]}</b></div>${expl}`;
  }
  const last=quizState.qi+1>=quizState.questions.length;
  fb.innerHTML+=`<button class="next-btn-${t}" onclick="quizState.qi++;renderQuizQ(document.getElementById('player-body'))">${last?'See Results 🎉':'Next →'}</button>`;
}

// COMPLETION
// ═══════════════════════════════════════════════
function showCompletion(body,score,total){
  const t=currentProfile.theme;
  const {subj,actId,xp}=window._currentActivity;
  const pct=Math.round((score/total)*100);
  const earned=Math.round(xp*(score/total));
  const cat=t==='j'?catalogJ:catalogS;
  const key=subj+'_'+actId;
  if(!state.completed[key]||state.completed[key].pct<pct)
    state.completed[key]={score,total,pct,earned,date:new Date().toLocaleDateString()};
  state.xp+=earned;
  if(state.streak<7)state.streak=Math.min(7,state.streak+1);
  const logEntry={subj,actId,score,total,pct,earned,date:new Date().toLocaleDateString()};
  state.log.unshift(logEntry);
  if(state.log.length>20)state.log.pop();
  saveState(); syncToSheet(logEntry);
  const medal=pct>=90?'🏆':pct>=70?'🥈':pct>=50?'🥉':'🌟';
  const msgs={j:{90:'Outstanding, Explorer!',70:'Great job, Jaishnav!',50:'Good effort! Keep going!',0:"Keep practising, you will get there!"},
               s:{90:'Web-slinger Champion!',70:'Super job, Shakshu!',50:'Good try, Hero!',0:'Heroes never give up!'}};
  const msgSet=msgs[t];
  const msg=pct>=90?msgSet[90]:pct>=70?msgSet[70]:pct>=50?msgSet[50]:msgSet[0];
  body.innerHTML=`
    <div class="complete-card">
      <div class="complete-icon">${medal}</div>
      <div class="complete-title-${t}">${msg}</div>
      <div class="complete-score">You scored ${score} out of ${total} (${pct}%)</div>
      <div class="xp-earned-${t}">+${earned} XP earned! ⭐</div>
      <button class="home-return-btn-${t}" onclick="showScreen('home-screen');renderHomeForProfile()">${t==='j'?'Back to Mission Control 🚀':'Back to Hero HQ 🕷️'}</button>
    </div>`;
}

function syncToSheet(logEntry){
  if(!SHEETS_URL||!currentProfile)return;
  const cat=currentProfile.theme==='j'?catalogJ:catalogS;
  fetch(SHEETS_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({type:'log',child:currentProfile.nick,date:logEntry.date,
      subject:cat[logEntry.subj]?.name||logEntry.subj,
      activity:cat[logEntry.subj]?.activities.find(a=>a.id===logEntry.actId)?.title||logEntry.actId,
      score:logEntry.score,total:logEntry.total,pct:(logEntry.pct/100).toFixed(2),xp:logEntry.earned,duration:'—'})
  }).catch(()=>{});
}

async function fetchAssignments(){
  if(!SHEETS_URL||!currentProfile)return;
  try{
    const t=currentProfile.theme;
    const res=await fetch(SHEETS_URL+'?child='+currentProfile.nick+'&t='+Date.now());
    const data=await res.json();
    if(data.status==='ok'&&data.assignments?.length){
      const container=document.getElementById('sheet-missions-'+t);
      if(!container)return;
      container.innerHTML='';
      const titleDiv=document.createElement('div');
      titleDiv.className=`section-title section-title-${t}`;
      titleDiv.textContent='📨 New from Dad';
      container.appendChild(titleDiv);
      data.assignments.forEach(a=>{
        const card=document.createElement('div');
        card.className=`mission-card mission-card-${t}`;
        card.style.cursor='default';
        card.innerHTML=`
          <div class="mission-tag-${t}">${a.subject} · ${a.type}</div>
          <div class="mission-title">${a.question}</div>
          <div class="mission-sub">Due: ${a.due}</div>
          <div class="mission-xp-${t}">+${a.xp||20} XP</div>`;
        container.appendChild(card);
      });
    }
  }catch(e){}
}

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function showToast(msg){
  const t=currentProfile?.theme||'j';
  const el=document.getElementById('toast');
  el.textContent=msg; el.className=`show toast-${t}`;
  setTimeout(()=>el.className='',2500);
}

document.getElementById('nav-parent')?.addEventListener('click',setupParentScreen);
document.querySelectorAll('[onclick*="parent-screen"]').forEach(el=>{
  const orig=el.getAttribute('onclick');
  el.setAttribute('onclick',orig.replace("showScreen('parent-screen')",'showScreen(\'parent-screen\');setupParentScreen()'));
});

function fdColVal(col) {
  var m = {teal:'#14b8a6',cyan:'var(--j-cyan)',purple:'var(--j-purple)',green:'var(--j-green)',
           gold:'var(--j-gold)',coral:'var(--j-coral)',indigo:'#6366f1',pink:'#f472b6',
           orange:'var(--j-orange)'};
  return m[col] || '#fff';
}

function fdUpdateBar() {
  var pct = Math.min(100, (fdXP / FD_TOTAL_XP) * 100);
  var bar = document.getElementById('fd-bar');
  var txt = document.getElementById('fd-bar-txt');
  var xpEl = document.getElementById('fd-day-xp');
  if (bar) bar.style.width = pct + '%';
  if (txt) txt.textContent = fdXP + ' / ' + FD_TOTAL_XP + ' XP';
  if (xpEl) xpEl.textContent = fdXP + ' XP';
}

function fdXPPop(n) {
  var el = document.getElementById('fd-xp-pop');
  if (!el) return;
  el.textContent = '+' + n + ' XP';
  el.classList.add('show');
  setTimeout(function() { el.classList.remove('show'); }, 1400);
}

function openFullDay() {
  var btn = document.getElementById('nav-fullday');
  if (btn) btn.style.display = 'flex';
  showScreen('fd-screen');
  fdUpdateBar();
  fdRenderList();
}

function fdRenderList() {
  var body = document.getElementById('fd-list-body');
  if (!body) return;
  var prevDone = true;
  var html = '<div class="fd-body">';
  html += '<div class="fd-intro">';
  html += '<span class="fd-intro-icon">🚀</span>';
  html += '<div class="fd-intro-title">Full Day Academy</div>';
  html += '<div class="fd-intro-sub">8 levels · 6 hours · Teaches first, tests after · Gets harder as you go</div>';
  html += '</div>';
  for (var i = 0; i < FD_LEVELS.length; i++) {
    var lev = FD_LEVELS[i];
    var isBreak = lev.id === 'break';
    var isDone = isBreak || (fdDone['L' + lev.id + '_done'] === 1);
    var isLocked = !prevDone;
    var col = fdColVal(lev.col);
    var cls = 'fd-lev-card' + (isDone ? ' fd-done' : isLocked ? ' fd-locked' : '');
    var clickAttr = (!isLocked && !isBreak) ? ' onclick="fdOpenLevel(' + i + ')"' : '';
    html += '<div class="' + cls + '"' + clickAttr + '>';
    html += '<div class="fd-lev-icon">' + lev.icon + '</div>';
    html += '<div class="fd-lev-info">';
    html += '<div class="fd-lev-name" style="color:' + col + '">' + (isBreak ? '' : 'Level ' + lev.id + ' — ') + lev.name + '</div>';
    var metaTxt = lev.time + (lev.secs.length ? ' · ' + lev.secs.length + ' sections' : '') + (isLocked ? ' · 🔒 Complete previous level first' : '');
    html += '<div class="fd-lev-meta">' + metaTxt + '</div>';
    html += '</div>';
    html += '<div>' + (isLocked ? '🔒' : isDone ? '✅' : '▶️') + '</div>';
    if (!isBreak) html += '<div class="fd-lev-xp">+' + lev.xp + ' XP</div>';
    html += '</div>';
    if (!isBreak) prevDone = isDone;
  }
  html += '</div>';
  body.innerHTML = html;
}

function fdOpenLevel(idx) {
  var lev = FD_LEVELS[idx];
  if (!lev || lev.id === 'break') return;
  document.getElementById('fd-plev').textContent = 'LEVEL ' + lev.id;
  document.getElementById('fd-ptitle').textContent = lev.icon + ' ' + lev.name;
  document.getElementById('fd-pxp').textContent = '+' + lev.xp + ' XP';
  window._fdLIdx = idx;
  window._fdSIdx = 0;
  fdRenderSection();
  showScreen('fd-player');
}

function fdRenderSection() {
  var lev = FD_LEVELS[window._fdLIdx];
  var si = window._fdSIdx;
  var body = document.getElementById('fd-pbody');
  if (!body) return;
  window.scrollTo(0, 0);
  if (si >= lev.secs.length) { fdLevelDone(); return; }
  var sec = lev.secs[si];
  var totalQs = 0;
  for (var i = 0; i < lev.secs.length; i++) totalQs += lev.secs[i].qs.length;
  var xpPerQ = Math.max(2, Math.floor(lev.xp / totalQs));
  var trickHtml = sec.trick ? '<div class="fd-trick"><div class="fd-trick-lbl">💡 TRICK / SHORTCUT</div>' + sec.trick + '</div>' : '';
  body.innerHTML = '<div class="fd-teach c-' + sec.col + '"><div class="fd-teach-lbl c-' + sec.col + '">' + sec.icon + ' ' + sec.lbl + '</div><div class="fd-content">' + sec.teach + '</div></div>' + trickHtml + '<div class="fd-div"><div class="fd-div-line"></div><div class="fd-div-txt">NOW TEST YOURSELF</div><div class="fd-div-line"></div></div><div id="fd-quiz-wrap"></div>';
  fdRunQuiz(document.getElementById('fd-quiz-wrap'), sec.qs, sec.col, xpPerQ);
}

function fdRunQuiz(wrap, qs, col, xpPerQ) {
  var qi = 0, score = 0;
  var total = qs.length;
  var colVal = fdColVal(col);
  function render() {
    if (qi >= total) { window._fdSIdx++; fdRenderSection(); return; }
    var q = qs[qi];
    var optsHtml = '';
    for (var i = 0; i < q.o.length; i++) {
      optsHtml += '<button class="fd-opt" onclick="fdAns(' + i + ',' + q.a + ',this)">' + q.o[i] + '</button>';
    }
    var pct = Math.round((qi / total) * 100);
    wrap.innerHTML = '<div class="fd-qprog"><div class="fd-qpb"><div class="fd-qpb-fill" style="width:' + pct + '%;background:' + colVal + '"></div></div><div class="fd-qlabel">' + (qi+1) + '/' + total + '</div></div><div class="fd-qcard"><div class="fd-qnum">QUESTION ' + (qi+1) + '</div><div class="fd-qtext">' + q.q + '</div></div><div class="fd-opts" id="fd-opts">' + optsHtml + '</div><div id="fd-fb"></div>';
  }
  window.fdAns = function(chosen, correct, btn) {
    var opts = document.querySelectorAll('.fd-opt');
    for (var i = 0; i < opts.length; i++) opts[i].disabled = true;
    var isLast = (qi + 1) >= total;
    var nbBg = isLast ? 'linear-gradient(135deg,var(--j-gold),var(--j-orange))' : 'linear-gradient(135deg,var(--j-cyan),var(--j-purple))';
    var nbTxt = isLast ? 'See Results 🎉' : 'Next →';
    var nbHtml = '<button class="fd-nxt" style="background:' + nbBg + '" onclick="fdNext()">' + nbTxt + '</button>';
    var fb = document.getElementById('fd-fb');
    if (chosen === correct) {
      btn.classList.add('correct');
      score++;
      fdXP += xpPerQ;
      fdXPPop(xpPerQ);
      fdUpdateBar();
      state.xp += xpPerQ;
      saveState();
      fb.innerHTML = '<div class="fd-fb good">⭐ Correct! ' + (qs[qi].e || '') + nbHtml + '</div>';
    } else {
      btn.classList.add('wrong');
      opts[correct].classList.add('correct');
      fb.innerHTML = '<div class="fd-fb bad">Not quite — <b>' + qs[qi].o[correct] + '</b><br><span style="font-size:.78rem;color:#8ba3cc">' + (qs[qi].e || '') + '</span>' + nbHtml + '</div>';
    }
  };
  window.fdNext = function() { qi++; render(); };
  window._fdScore = function() { return score; };
  render();
}

function fdLevelDone() {
  var lev = FD_LEVELS[window._fdLIdx];
  var body = document.getElementById('fd-pbody');
  var totalQ = 0;
  for (var i = 0; i < lev.secs.length; i++) totalQ += lev.secs[i].qs.length;
  var correct = window._fdScore ? window._fdScore() : 0;
  fdDone['L' + lev.id + '_done'] = 1;
  var pct = totalQ ? Math.round((correct / totalQ) * 100) : 100;
  var earned = Math.round(lev.xp * (pct / 100));
  var medal = pct >= 80 ? '🏆' : pct >= 60 ? '🥈' : '🌟';
  var title = pct >= 80 ? 'Outstanding!' : pct >= 60 ? 'Great work!' : 'Good effort!';
  syncToSheet({subj:'fullday', actId:'L'+lev.id, score:correct, total:totalQ, pct:pct, earned:earned, date:new Date().toLocaleDateString()});
  var allDone = true;
  for (var i = 0; i < FD_LEVELS.length; i++) {
    if (FD_LEVELS[i].id !== 'break' && !fdDone['L' + FD_LEVELS[i].id + '_done']) { allDone = false; break; }
  }
  var learnedHtml = '';
  for (var i = 0; i < lev.learned.length; i++) {
    learnedHtml += '<div class="fd-learned-item">✓ ' + lev.learned[i] + '</div>';
  }
  var actionBtn = allDone ? fdFinalHTML() : '<button class="fd-cont-btn" onclick="fdBackToList()">Back to levels →</button>';
  body.innerHTML = '<div class="fd-scomp"><span class="fd-scomp-icon">' + medal + '</span><div class="fd-scomp-title">' + title + '</div><div class="fd-scomp-score">Level ' + lev.id + ' complete!</div><div class="fd-scomp-xp">+' + earned + ' XP earned ⭐</div><div class="fd-learned"><div class="fd-learned-title">🧠 WHAT YOU JUST LEARNED</div>' + learnedHtml + '</div>' + actionBtn + '</div>';
}

function fdBackToList() {
  showScreen('fd-screen');
  fdRenderList();
}

function fdGoHome() {
  showScreen('home-screen');
  setActiveNav('nav-home');
  renderHomeForProfile();
}

function fdFinalHTML() {

  statsHtml += '<div class="fd-stat"><div class="fd-stat-n" style="color:var(--j-green)">6h</div><div class="fd-stat-l">STUDIED</div></div>';
  statsHtml += '<div class="fd-stat"><div class="fd-stat-n" style="color:var(--j-coral)">100+</div><div class="fd-stat-l">QUESTIONS</div></div>';
  statsHtml += '</div>';
  var certHtml = '<div class="fd-cert"><div class="fd-cert-lbl">🎖️ CERTIFICATE OF ACHIEVEMENT</div><div class="fd-cert-name">JAISHNAV</div><div class="fd-cert-txt">Completed the Full Day Academy — 8 levels, 6 hours, 100+ questions across Maths, IQ, Science, English, Tamil and Hindi.</div></div>';
  return '<div class="fd-final"><span class="fd-final-icon">🏆</span><div class="fd-final-title">FULL DAY COMPLETE!</div>' + statsHtml + certHtml + '<button class="fd-cont-btn" onclick="fdGoHome()">Back to Home 🚀</button></div>';
}
